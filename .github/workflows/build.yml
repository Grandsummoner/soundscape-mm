name: Build VCV Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            sdk-url: https://vcvrack.com/downloads/Rack-SDK-2.6.0-lin-x64.zip
          - os: macos-latest
            sdk-url: https://vcvrack.com/downloads/Rack-SDK-2.6.0-mac-x64+arm64.zip
          - os: windows-latest
            sdk-url: https://vcvrack.com/downloads/Rack-SDK-2.6.0-win-x64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Download Rack SDK
        shell: bash
        run: |
          curl -sLo rack-sdk.zip "${{ matrix.sdk-url }}"
          unzip -q rack-sdk.zip
          ls -la

      - name: Build
        shell: bash
        run: |
          export RACK_DIR=${{ github.workspace }}/Rack-SDK
          echo "RACK_DIR=$RACK_DIR"
          ls -la
          make

      - name: Package
        shell: bash
        run: |
          export RACK_DIR=${{ github.workspace }}/Rack-SDK
          make dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.os }}
          path: dist/

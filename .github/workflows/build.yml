name: Build VCV Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows

    steps:
      - uses: actions/checkout@v4

      - name: Download Rack SDK (Linux)
        if: matrix.platform == 'linux'
        run: |
          curl -sLo rack-sdk.zip "https://vcvrack.com/downloads/Rack-SDK-2.6.0-lin-x64.zip"
          unzip -q rack-sdk.zip

      - name: Download Rack SDK (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          curl -sLo rack-sdk.zip "https://vcvrack.com/downloads/Rack-SDK-2.6.0-win-x64.zip"
          unzip -q rack-sdk.zip

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: |
          make RACK_DIR=${{ github.workspace }}/Rack-SDK

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: |
          make dist RACK_DIR=${{ github.workspace }}/Rack-SDK

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          export RACK_DIR=$(pwd)/Rack-SDK
          make RACK_DIR=$(pwd)/Rack-SDK

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          export RACK_DIR=$(pwd)/Rack-SDK
          make dist RACK_DIR=$(pwd)/Rack-SDK

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.platform }}
          path: dist/

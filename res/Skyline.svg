<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  Skyline VCV Rack Panel — 20HP (300 × 380 px)
  All pixel coordinates derived from: scale = 300/101.6 = 2.9528 px/mm
  Matching exactly the mm positions in SkylineWidget constructor.

  Channel X px: 20.7, 57.6, 94.6, 131.5, 168.5, 205.4, 242.4, 279.3
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="300" height="380"
     viewBox="0 0 300 380" version="1.1">

  <!-- PANEL BACKGROUND -->
  <rect width="300" height="380" fill="#b8b5ae"/>
  <rect x="2" y="2" width="296" height="376" fill="#e2dfd8" rx="1"/>

  <!-- SECTION BANDS (subtle) -->
  <!-- outputs band -->
  <rect x="2" y="35" width="296" height="80" fill="#dedad3" rx="0"/>
  <!-- controls band -->
  <rect x="2" y="115" width="296" height="90" fill="#e5e2db" rx="0"/>
  <!-- sliders band -->
  <rect x="2" y="205" width="296" height="100" fill="#dedad3" rx="0"/>
  <!-- step buttons band -->
  <rect x="2" y="280" width="296" height="98" fill="#e5e2db" rx="0"/>

  <!-- DIVIDER LINES -->
  <line x1="4" y1="35"  x2="296" y2="35"  stroke="#c8c5be" stroke-width="0.75"/>
  <line x1="4" y1="115" x2="296" y2="115" stroke="#c8c5be" stroke-width="0.75"/>
  <line x1="4" y1="205" x2="296" y2="205" stroke="#c8c5be" stroke-width="0.75"/>
  <line x1="4" y1="280" x2="296" y2="280" stroke="#c8c5be" stroke-width="0.75"/>

  <!-- No decorative screws -->

  <!-- ═══════════════════════════════════════════
       TITLE AREA  (y=2-35)
  ═══════════════════════════════════════════ -->
  <text x="150" y="17" font-family="sans-serif" font-size="11" font-weight="bold"
        fill="#111" text-anchor="middle" letter-spacing="3">SKYLINE</text>
  <text x="150" y="29" font-family="sans-serif" font-size="7" fill="#888"
        text-anchor="middle" letter-spacing="1.5">8 CHANNEL CV SEQUENCER</text>

  <!-- ═══════════════════════════════════════════
       CHANNEL NUMBERS  y=43 (above jacks at y=66)
       Channel X: 20.7, 57.6, 94.6, 131.5, 168.5, 205.4, 242.4, 279.3
  ═══════════════════════════════════════════ -->
  <text x="20.7"  y="43" font-family="sans-serif" font-size="9" font-weight="bold" fill="#333" text-anchor="middle">1</text>
  <text x="57.6"  y="43" font-family="sans-serif" font-size="9" font-weight="bold" fill="#333" text-anchor="middle">2</text>
  <text x="94.6"  y="43" font-family="sans-serif" font-size="9" font-weight="bold" fill="#333" text-anchor="middle">3</text>
  <text x="131.5" y="43" font-family="sans-serif" font-size="9" font-weight="bold" fill="#333" text-anchor="middle">4</text>
  <text x="168.5" y="43" font-family="sans-serif" font-size="9" font-weight="bold" fill="#333" text-anchor="middle">5</text>
  <text x="205.4" y="43" font-family="sans-serif" font-size="9" font-weight="bold" fill="#333" text-anchor="middle">6</text>
  <text x="242.4" y="43" font-family="sans-serif" font-size="9" font-weight="bold" fill="#333" text-anchor="middle">7</text>
  <text x="279.3" y="43" font-family="sans-serif" font-size="9" font-weight="bold" fill="#333" text-anchor="middle">8</text>

  <!-- ═══════════════════════════════════════════
       OUTPUT JACK RINGS  y=66.4  r=11
       (PJ301MPort will render on top)
  ═══════════════════════════════════════════ -->
  <circle cx="20.7"  cy="66.4" r="11" fill="#a0a09a" stroke="#777" stroke-width="1.2"/>
  <circle cx="57.6"  cy="66.4" r="11" fill="#a0a09a" stroke="#777" stroke-width="1.2"/>
  <circle cx="94.6"  cy="66.4" r="11" fill="#a0a09a" stroke="#777" stroke-width="1.2"/>
  <circle cx="131.5" cy="66.4" r="11" fill="#a0a09a" stroke="#777" stroke-width="1.2"/>
  <circle cx="168.5" cy="66.4" r="11" fill="#a0a09a" stroke="#777" stroke-width="1.2"/>
  <circle cx="205.4" cy="66.4" r="11" fill="#a0a09a" stroke="#777" stroke-width="1.2"/>
  <circle cx="242.4" cy="66.4" r="11" fill="#a0a09a" stroke="#777" stroke-width="1.2"/>
  <circle cx="279.3" cy="66.4" r="11" fill="#a0a09a" stroke="#777" stroke-width="1.2"/>

  <!-- LED recesses  y=91.5 -->
  <circle cx="20.7"  cy="91.5" r="4.5" fill="#5a1010"/>
  <circle cx="57.6"  cy="91.5" r="4.5" fill="#5a1010"/>
  <circle cx="94.6"  cy="91.5" r="4.5" fill="#5a1010"/>
  <circle cx="131.5" cy="91.5" r="4.5" fill="#5a1010"/>
  <circle cx="168.5" cy="91.5" r="4.5" fill="#5a1010"/>
  <circle cx="205.4" cy="91.5" r="4.5" fill="#5a1010"/>
  <circle cx="242.4" cy="91.5" r="4.5" fill="#5a1010"/>
  <circle cx="279.3" cy="91.5" r="4.5" fill="#5a1010"/>

  <!-- ═══════════════════════════════════════════
       CONTROLS SECTION  y=115-205
  ═══════════════════════════════════════════ -->

  <!-- Label row  y=113.7 -->
  <!-- CLK/CV label above jack at xJack=20.7 -->
  <text x="20.7"  y="122" font-family="sans-serif" font-size="7" fill="#555" text-anchor="middle">CLK/CV</text>
  <!-- OFFSET/ATTEN/DIVIDE above knobs -->
  <text x="94.5"  y="122" font-family="sans-serif" font-size="7" fill="#555" text-anchor="middle">OFFSET</text>
  <text x="143.2" y="122" font-family="sans-serif" font-size="7" fill="#555" text-anchor="middle">ATTEN</text>
  <text x="191.9" y="122" font-family="sans-serif" font-size="7" fill="#555" text-anchor="middle">DIVIDE</text>
  <!-- Mode button labels row 1: MUTE LEN SHIFT -->
  <text x="231.8" y="122" font-family="sans-serif" font-size="7" fill="#555" text-anchor="middle">MUTE</text>
  <text x="256.9" y="122" font-family="sans-serif" font-size="7" fill="#555" text-anchor="middle">LEN</text>
  <text x="282.0" y="122" font-family="sans-serif" font-size="7" fill="#555" text-anchor="middle">SHIFT</text>

  <!-- CLK/CV jack recess  y=135.8 -->
  <circle cx="20.7" cy="135.8" r="11" fill="#a0a09a" stroke="#777" stroke-width="1.2"/>

  <!-- 3-way switch recess  x=59.1  y=158.0 (CKSSThree ≈16px tall) -->
  <rect x="54.1" y="143" width="10" height="30" rx="3" fill="#c5c2bb" stroke="#999" stroke-width="0.8"/>
  <!-- switch knob (upper = CLK default) -->
  <rect x="55.6" y="145" width="7" height="9" rx="1.5" fill="#222"/>

  <!-- RST/HLD label + jack recess  y=180.1 -->
  <text x="20.7"  y="170" font-family="sans-serif" font-size="7" fill="#555" text-anchor="middle">RST/HLD</text>
  <circle cx="20.7" cy="180.1" r="11" fill="#a0a09a" stroke="#777" stroke-width="1.2"/>

  <!-- Knob recesses  y=158.0  r=14 -->
  <circle cx="94.5"  cy="158.0" r="14" fill="#c8c5be" stroke="#999" stroke-width="0.8"/>
  <circle cx="143.2" cy="158.0" r="14" fill="#c8c5be" stroke="#999" stroke-width="0.8"/>
  <circle cx="191.9" cy="158.0" r="14" fill="#c8c5be" stroke="#999" stroke-width="0.8"/>

  <!-- Mode button recesses row 1  y=135.8  r=11 -->
  <circle cx="231.8" cy="135.8" r="11" fill="#ccc" stroke="#aaa" stroke-width="0.8"/>
  <circle cx="256.9" cy="135.8" r="11" fill="#ccc" stroke="#aaa" stroke-width="0.8"/>
  <circle cx="282.0" cy="135.8" r="11" fill="#ccc" stroke="#aaa" stroke-width="0.8"/>

  <!-- Mode button labels row 2 (between rows): SCALE SAVE RECALL  y=160.9 -->
  <text x="231.8" y="160.9" font-family="sans-serif" font-size="7" fill="#555" text-anchor="middle">SCALE</text>
  <text x="256.9" y="160.9" font-family="sans-serif" font-size="7" fill="#555" text-anchor="middle">SAVE</text>
  <text x="282.0" y="160.9" font-family="sans-serif" font-size="7" fill="#555" text-anchor="middle">RECALL</text>

  <!-- Mode button recesses row 2  y=180.1  r=11 -->
  <circle cx="231.8" cy="180.1" r="11" fill="#ccc" stroke="#aaa" stroke-width="0.8"/>
  <circle cx="256.9" cy="180.1" r="11" fill="#ccc" stroke="#aaa" stroke-width="0.8"/>
  <circle cx="282.0" cy="180.1" r="11" fill="#ccc" stroke="#aaa" stroke-width="0.8"/>

  <!-- ═══════════════════════════════════════════
       SLIDER TRACKS  top=206.7, height=65px (matches SlimFader TH=60 + HH=8)
       x centres = cX, track width = 6px, offset -3
  ═══════════════════════════════════════════ -->
  <rect x="17.7"  y="206.7" width="6" height="68" rx="3" fill="#b5b2ab" stroke="#9a9790" stroke-width="0.5"/>
  <rect x="54.6"  y="206.7" width="6" height="68" rx="3" fill="#b5b2ab" stroke="#9a9790" stroke-width="0.5"/>
  <rect x="91.6"  y="206.7" width="6" height="68" rx="3" fill="#b5b2ab" stroke="#9a9790" stroke-width="0.5"/>
  <rect x="128.5" y="206.7" width="6" height="68" rx="3" fill="#b5b2ab" stroke="#9a9790" stroke-width="0.5"/>
  <rect x="165.5" y="206.7" width="6" height="68" rx="3" fill="#b5b2ab" stroke="#9a9790" stroke-width="0.5"/>
  <rect x="202.4" y="206.7" width="6" height="68" rx="3" fill="#b5b2ab" stroke="#9a9790" stroke-width="0.5"/>
  <rect x="239.4" y="206.7" width="6" height="68" rx="3" fill="#b5b2ab" stroke="#9a9790" stroke-width="0.5"/>
  <rect x="276.3" y="206.7" width="6" height="68" rx="3" fill="#b5b2ab" stroke="#9a9790" stroke-width="0.5"/>

  <!-- ═══════════════════════════════════════════
       STEP BUTTONS  — 2 rows × 8
       Row 1: LED y=295  btn y=307.1  r=11
       Row 2: LED y=340  btn y=351.4  r=11
       Labels: y=373.5
  ═══════════════════════════════════════════ -->

  <!-- Step button recesses row 1  y=307.1  r=11 -->
  <circle cx="20.7"  cy="307.1" r="11" fill="#363636" stroke="#222" stroke-width="0.8"/>
  <circle cx="57.6"  cy="307.1" r="11" fill="#363636" stroke="#222" stroke-width="0.8"/>
  <circle cx="94.6"  cy="307.1" r="11" fill="#363636" stroke="#222" stroke-width="0.8"/>
  <circle cx="131.5" cy="307.1" r="11" fill="#363636" stroke="#222" stroke-width="0.8"/>
  <circle cx="168.5" cy="307.1" r="11" fill="#363636" stroke="#222" stroke-width="0.8"/>
  <circle cx="205.4" cy="307.1" r="11" fill="#363636" stroke="#222" stroke-width="0.8"/>
  <circle cx="242.4" cy="307.1" r="11" fill="#363636" stroke="#222" stroke-width="0.8"/>
  <circle cx="279.3" cy="307.1" r="11" fill="#363636" stroke="#222" stroke-width="0.8"/>

  <!-- Step button recesses row 2  y=351.4  r=11 -->
  <circle cx="20.7"  cy="351.4" r="11" fill="#363636" stroke="#222" stroke-width="0.8"/>
  <circle cx="57.6"  cy="351.4" r="11" fill="#363636" stroke="#222" stroke-width="0.8"/>
  <circle cx="94.6"  cy="351.4" r="11" fill="#363636" stroke="#222" stroke-width="0.8"/>
  <circle cx="131.5" cy="351.4" r="11" fill="#363636" stroke="#222" stroke-width="0.8"/>
  <circle cx="168.5" cy="351.4" r="11" fill="#363636" stroke="#222" stroke-width="0.8"/>
  <circle cx="205.4" cy="351.4" r="11" fill="#363636" stroke="#222" stroke-width="0.8"/>
  <circle cx="242.4" cy="351.4" r="11" fill="#363636" stroke="#222" stroke-width="0.8"/>
  <circle cx="279.3" cy="351.4" r="11" fill="#363636" stroke="#222" stroke-width="0.8"/>

  <!-- Step function labels  y=373.5 (bottom edge of panel safe at 378) -->
  <text x="20.7"  y="373.5" font-family="sans-serif" font-size="6.5" fill="#444" text-anchor="middle">CLEAR</text>
  <text x="57.6"  y="373.5" font-family="sans-serif" font-size="6.5" fill="#444" text-anchor="middle">SMOOTH</text>
  <text x="94.6"  y="373.5" font-family="sans-serif" font-size="6.5" fill="#444" text-anchor="middle">RND</text>
  <text x="131.5" y="373.5" font-family="sans-serif" font-size="6.5" fill="#444" text-anchor="middle">FREEZE</text>
  <text x="168.5" y="373.5" font-family="sans-serif" font-size="6.5" fill="#444" text-anchor="middle">FWD</text>
  <text x="205.4" y="373.5" font-family="sans-serif" font-size="6.5" fill="#444" text-anchor="middle">REV</text>
  <text x="242.4" y="373.5" font-family="sans-serif" font-size="6.5" fill="#444" text-anchor="middle">PEND</text>
  <text x="279.3" y="373.5" font-family="sans-serif" font-size="6.5" fill="#444" text-anchor="middle">RNDSEQ</text>

</svg>
